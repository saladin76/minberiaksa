name: Export source snapshot

on:
  push:
    branches:
      - agent/critical-production-fixes
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: source-snapshot
          path: |
            .
            !.git
            !node_modules
          include-hidden-files: true
          retention-days: 1
