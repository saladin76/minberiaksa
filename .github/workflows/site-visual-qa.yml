name: Site Visual UX QA

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - app/**
      - components/**
      - data/**
      - config/**
      - styles/**
      - scripts/capture-site-visual-qa.mjs
      - .github/workflows/site-visual-qa.yml

permissions:
  contents: read

jobs:
  visual-ux-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Production build
        run: npm run build
      - name: Start production server
        run: |
          npm run start -- -p 3000 > /tmp/minberi-site-visual.log 2>&1 &
          echo $! > /tmp/minberi-site-visual.pid
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:3000/ > /dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/minberi-site-visual.log
          exit 1
      - name: Capture and audit all pages
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/capture-site-visual-qa.mjs
      - name: Upload visual QA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-visual-qa-${{ github.event.pull_request.head.sha }}
          path: artifacts/site-visual-qa
          if-no-files-found: error
          retention-days: 14
      - name: Stop production server
        if: always()
        run: |
          if [ -f /tmp/minberi-site-visual.pid ]; then kill "$(cat /tmp/minberi-site-visual.pid)" || true; fi
