name: Homepage Refinement QA

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - app/page.tsx
      - app/layout.tsx
      - components/homepage/homepage-sections.tsx
      - components/homepage/quick-giving.tsx
      - styles/homepage-unified.css
      - tests/homepage-refinement.spec.ts
      - scripts/capture-homepage-refinement.mjs
      - .github/workflows/homepage-refinement-qa.yml

permissions:
  contents: read

jobs:
  visual-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Production build
        run: npm run build
      - name: Start production server
        run: |
          npm run start -- -p 3000 > /tmp/minberi-homepage.log 2>&1 &
          echo $! > /tmp/minberi-homepage.pid
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:3000/ > /dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/minberi-homepage.log
          exit 1
      - name: Run homepage safeguards
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
        run: npx playwright test tests/homepage-refinement.spec.ts
      - name: Capture local production screenshots
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/capture-homepage-refinement.mjs
      - name: Upload homepage QA artifact
        uses: actions/upload-artifact@v4
        with:
          name: homepage-refinement-${{ github.event.pull_request.head.sha }}
          path: artifacts/homepage-refinement
          if-no-files-found: error
          retention-days: 14
      - name: Stop production server
        if: always()
        run: |
          if [ -f /tmp/minberi-homepage.pid ]; then kill "$(cat /tmp/minberi-homepage.pid)" || true; fi
